database:
  # PostgreSQL (default for multi-node):
  url: "${DATABASE_URL:postgres://lightstack:changeme@localhost/lightstack?sslmode=disable}"
  # Or use SQLite for single-node (zero external deps):
  # datastore: "sqlite:///var/lib/o3k/db/state.db"
  max_connections: 50  # Increased from 20 for higher concurrency
  min_connections: 2   # Keep minimal warm connections
  max_conn_lifetime: 1h
  max_conn_idle_time: 10m  # Reduced from 15m for aggressive cleanup
  health_check_period: 30s # Reduced from 1m for faster failure detection

keystone:
  port: 35357
  jwt_secret: "change-me-in-production"  # DEV ONLY — override via O3K_JWT_SECRET in production
  token_ttl: 24h
  admin_user: admin
  admin_password: secret

compute:
  # Node identifier - auto-generates UUID if set to "auto"
  node_id: auto
  # Tunnel IP for VXLAN - auto-detects if set to "auto"
  tunnel_ip: auto
  # VXLAN UDP port (default: 4789)
  vxlan_port: 4789
  # Heartbeat interval for node registry
  heartbeat_interval: 30s

nova:
  port: 8774
  libvirt_uri: "qemu:///system"
  default_flavor: m1.small
  libvirt_mode: stub  # "stub" or "real"

neutron:
  port: 9696
  dhcp_lease_time: 24h
  iptables_enabled: true
  networking_mode: stub  # "stub", "iptables", or "ebpf"

  # Security group backend (eBPF requires networking_mode: "real" or "ebpf")
  security_group_mode: stub  # "stub", "iptables", or "ebpf"
  ebpf_object_path: "pkg/networking/ebpf/secgroup.o"  # Path to compiled eBPF object

  # VXLAN overlay networking for multi-node
  vxlan_enabled: false
  vni_range_start: 1000
  vni_range_end: 10000
  coordination_poll_interval: 1s
  vxlan_mtu: 1450

cinder:
  port: 8776
  ceph_pool: volumes
  ceph_conf: /etc/ceph/ceph.conf
  storage_mode: local  # "stub", "local", "rbd", or "local,rbd"

glance:
  port: 9292
  ceph_pool: images
  ceph_conf: /etc/ceph/ceph.conf
  storage_mode: local  # "stub", "local", "rbd", "s3", "local,rbd", "local,s3", "rbd,s3"
  s3_bucket: ""       # S3 bucket name (required for s3 mode)
  s3_region: us-east-1  # S3 region
  s3_endpoint: ""     # Custom S3 endpoint (for MinIO, Ceph RGW, etc.)

server:
  cors_allowed_origins:
    - "http://localhost"
    - "http://localhost:3000"

logging:
  level: info
  format: json

cache:
  enabled: false  # Set to true to enable Redis caching
  redis_url: "redis://localhost:6379/0"
  key_prefix: "o3k:"
  default_ttl: 1h

  # Per-resource TTL overrides (optional)
  ttl:
    flavors: 24h        # Flavors rarely change
    images: 1h          # Images change occasionally
    networks: 30m       # Networks change more frequently
    service_catalog: 24h # Service catalog is static

tunnel:
  port: 6385
  token_secret: ""
