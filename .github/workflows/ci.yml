name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build all binaries
        run: |
          make build
          make build-compat-check

      - name: Check binary size
        run: |
          SIZE=$(stat --format=%s bin/o3k)
          SIZE_MB=$(($SIZE / 1048576))
          echo "o3k binary: ${SIZE_MB}MB"
          if [ $SIZE -gt 83886080 ]; then
            echo "::error::Binary too large: ${SIZE_MB}MB (max 80MB)"
            exit 1
          fi

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 3

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run tests with race detector
        run: go test -race -coverprofile=coverage.txt -covermode=atomic $(go list ./... | grep -v '/test/contract')

      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          echo "coverage=${COVERAGE}" >> $GITHUB_OUTPUT

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.txt
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          args: --timeout=5m

  vulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  compat-check:
    name: Compat-Check Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9'

      - name: Build and run compat-check
        run: |
          make build-compat-check
          make compat-check-smoke

      - name: Run E2E compat-check test
        run: go test ./internal/compat/... -run TestCheckerRunWithTerraform -v -count=1 -timeout 5m

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Start services
        env:
          POSTGRES_PASSWORD: ci-postgres-password-not-secret
          O3K_JWT_SECRET: ci-jwt-secret-32chars-or-more-padded-out-here
          O3K_ADMIN_PASSWORD: secret
        run: |
          docker compose -f deployments/docker-compose.yml up -d
          timeout 300 bash -c 'until curl -sf http://localhost:35357/v3 > /dev/null; do sleep 3; done'

      - name: Run contract tests
        run: |
          cd test/contract && go test -v ./... -count=1 -timeout=10m 2>&1 | tee /tmp/results.txt
        env:
          OS_AUTH_URL: "http://localhost:35357/v3"
          OS_USERNAME: "admin"
          OS_PASSWORD: "secret"
          OS_PROJECT_NAME: "default"
          OS_USER_DOMAIN_NAME: "Default"
          OS_PROJECT_DOMAIN_NAME: "Default"

      - name: Check pass rate
        if: always()
        run: |
          if [ ! -f /tmp/results.txt ]; then
            echo "::error::Contract test results missing"
            exit 1
          fi
          PASSED=$(grep -c "^--- PASS:" /tmp/results.txt || true)
          FAILED=$(grep -c "^--- FAIL:" /tmp/results.txt || true)
          TOTAL=$((PASSED + FAILED))
          if [ $TOTAL -eq 0 ]; then
            echo "::error::No contract tests ran"
            exit 1
          fi
          RATE=$((PASSED * 100 / TOTAL))
          echo "Pass rate: ${RATE}% ($PASSED/$TOTAL)"
          if [ $RATE -lt 85 ]; then
            echo "::error::Contract tests below 85% threshold (${RATE}%, $PASSED/$TOTAL)"
            exit 1
          fi

      - name: Dump service logs on failure
        if: failure()
        env:
          POSTGRES_PASSWORD: ci-postgres-password-not-secret
          O3K_JWT_SECRET: ci-jwt-secret-32chars-or-more-padded-out-here
          O3K_ADMIN_PASSWORD: secret
        run: docker compose -f deployments/docker-compose.yml logs --tail=2000

      - name: Cleanup
        if: always()
        env:
          POSTGRES_PASSWORD: ci-postgres-password-not-secret
          O3K_JWT_SECRET: ci-jwt-secret-32chars-or-more-padded-out-here
          O3K_ADMIN_PASSWORD: secret
        run: docker compose -f deployments/docker-compose.yml down -v

  ebpf-smoke:
    name: eBPF Compile + Load
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update
          # gcc-multilib provides gnu/stubs-32.h pulled in transitively by
          # asm/types.h on ubuntu-noble. Without it, clang -target bpf fails
          # to find the 32-bit stubs header even though we never link 32-bit.
          sudo apt-get install -y clang llvm libbpf-dev gcc-multilib linux-headers-$(uname -r) || \
            sudo apt-get install -y clang llvm libbpf-dev gcc-multilib linux-libc-dev

      - name: Verify clang version
        run: clang --version

      - name: Compile eBPF program
        run: make build-ebpf

      - name: Verify object file exists
        run: |
          test -f pkg/networking/ebpf/secgroup.o
          file pkg/networking/ebpf/secgroup.o | grep -q "ELF.*BPF"

      - name: Run eBPF load smoke test
        # Requires CAP_BPF / CAP_SYS_ADMIN to actually load into the kernel.
        # GitHub Actions ubuntu runners support this via sudo.
        run: |
          cd pkg/networking/ebpf
          sudo -E env "PATH=$PATH" "HOME=$HOME" \
            $(which go) test -tags ebpf_integration -v -run TestEBPFLoad -count=1 .

  glance-rbd:
    name: Glance RBD (microceph)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Ceph client headers
        run: |
          sudo apt-get update
          sudo apt-get install -y librados-dev librbd-dev libcephfs-dev pkg-config

      - name: Bootstrap microceph
        # microceph gives us a single-node Ceph in ~60s. Flake risk is
        # accepted; if this is a recurring problem we move to a dedicated
        # ceph runner.
        run: |
          sudo snap install microceph --channel=squid/stable
          sudo microceph cluster bootstrap
          sudo microceph disk add loop,2G,1
          sudo microceph enable rgw || true
          # Wait for the cluster to reach HEALTH_OK or HEALTH_WARN (single-OSD
          # clusters often sit at WARN; both are fine for our test).
          for i in $(seq 1 30); do
            STATUS=$(sudo microceph.ceph -s 2>&1 || true)
            if echo "$STATUS" | grep -qE "HEALTH_OK|HEALTH_WARN"; then
              echo "Cluster ready:"
              echo "$STATUS"
              break
            fi
            sleep 2
          done
          sudo microceph.ceph osd pool create rbd 8 8
          sudo microceph.ceph osd pool application enable rbd rbd
          # Single-OSD cluster: drop replication from default size=3,
          # min_size=2 down to size=1 so writes don't block waiting for
          # replicas that don't exist. Ceph blocks size=1 by default
          # (mon_allow_pool_size_one=false) — flip it on cluster-wide
          # before touching any pool. Also lower the cluster default for
          # any pool created later by tests.
          sudo microceph.ceph config set global mon_allow_pool_size_one true
          sudo microceph.ceph osd pool set rbd size 1 --yes-i-really-mean-it
          sudo microceph.ceph osd pool set rbd min_size 1
          sudo microceph.ceph config set global osd_pool_default_size 1
          sudo microceph.ceph config set global osd_pool_default_min_size 1

      - name: Expose Ceph config + keyring to test
        run: |
          sudo mkdir -p /etc/ceph
          sudo cp /var/snap/microceph/current/conf/ceph.conf /etc/ceph/ceph.conf
          sudo cp /var/snap/microceph/current/conf/ceph.keyring /etc/ceph/ceph.keyring
          sudo chmod a+r /etc/ceph/ceph.conf /etc/ceph/ceph.keyring
          cat /etc/ceph/ceph.conf

      - name: Run RBD integration tests
        env:
          O3K_TEST_CEPH_POOL: rbd
          O3K_TEST_CEPH_CONF: /etc/ceph/ceph.conf
        run: |
          go test -tags 'ceph rbd_integration' -v -count=1 -timeout 5m \
            -run TestRBDIntegration ./pkg/storage/...

      - name: Dump cluster state on failure
        if: failure()
        run: |
          sudo microceph.ceph -s || true
          sudo microceph.ceph osd tree || true
          sudo microceph.ceph osd pool ls detail || true

  vxlan-multinode:
    name: VXLAN Multi-Node Integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: o3k
          POSTGRES_PASSWORD: ci-postgres-password-not-secret
          POSTGRES_DB: o3k_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U o3k"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run VXLAN multi-node integration tests
        # Stub-mode VXLANManager + NamespaceManager mean no netlink/root
        # is needed; the subject under test is the database coordination
        # layer (node registry, VNI allocation, FDB sync). Migrations are
        # reset and re-applied per test, so the postgres service starts
        # empty.
        env:
          O3K_TEST_DB_URL: "postgres://o3k:ci-postgres-password-not-secret@localhost:5432/o3k_test?sslmode=disable"
        run: |
          go test -tags vxlan_integration -v -count=1 -timeout 5m \
            ./internal/neutron/...

  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [build, test, lint, vulncheck, compat-check, contract-tests, ebpf-smoke, glance-rbd, vxlan-multinode]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.vulncheck.result }}" != "success" ] || \
             [ "${{ needs.contract-tests.result }}" != "success" ] || \
             [ "${{ needs.compat-check.result }}" != "success" ] || \
             [ "${{ needs.ebpf-smoke.result }}" != "success" ] || \
             [ "${{ needs.glance-rbd.result }}" != "success" ] || \
             [ "${{ needs.vxlan-multinode.result }}" != "success" ]; then
            echo "::error::Required checks failed (build, test, lint, vulncheck, contract-tests, compat-check, ebpf-smoke, glance-rbd, or vxlan-multinode)"
            exit 1
          fi
          echo "All required checks passed"
