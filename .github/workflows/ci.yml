name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build all binaries
        run: |
          make build
          make build-compat-check

      - name: Check binary size
        run: |
          SIZE=$(stat --format=%s bin/o3k)
          SIZE_MB=$(($SIZE / 1048576))
          echo "o3k binary: ${SIZE_MB}MB"
          if [ $SIZE -gt 83886080 ]; then
            echo "::error::Binary too large: ${SIZE_MB}MB (max 80MB)"
            exit 1
          fi

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 3

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run tests with race detector
        run: go test -race -coverprofile=coverage.txt -covermode=atomic $(go list ./... | grep -v '/test/contract')

      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          echo "coverage=${COVERAGE}" >> $GITHUB_OUTPUT

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.txt
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run go vet
        run: go vet ./...

  compat-check:
    name: Compat-Check Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9'

      - name: Build and run compat-check
        run: |
          make build-compat-check
          make compat-check-smoke

      - name: Run E2E compat-check test
        run: go test ./internal/compat/... -run TestCheckerRunWithTerraform -v -count=1 -timeout 5m

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Start services
        run: |
          docker compose -f deployments/docker-compose.yml up -d
          timeout 120 bash -c 'until curl -sf http://localhost:35357/v3 > /dev/null; do sleep 3; done'

      - name: Run contract tests
        run: |
          cd test/contract && go test -v ./... -count=1 -timeout=10m 2>&1 | tee /tmp/results.txt
        env:
          OS_AUTH_URL: "http://localhost:35357/v3"
          OS_USERNAME: "admin"
          OS_PASSWORD: "secret"
          OS_PROJECT_NAME: "default"
          OS_USER_DOMAIN_NAME: "Default"
          OS_PROJECT_DOMAIN_NAME: "Default"
        continue-on-error: true

      - name: Check pass rate
        run: |
          PASSED=$(grep -c "^--- PASS:" /tmp/results.txt || echo "0")
          FAILED=$(grep -c "^--- FAIL:" /tmp/results.txt || echo "0")
          TOTAL=$((PASSED + FAILED))
          if [ $TOTAL -gt 0 ]; then
            RATE=$((PASSED * 100 / TOTAL))
            echo "Pass rate: ${RATE}% ($PASSED/$TOTAL)"
            if [ $RATE -lt 85 ]; then
              echo "::error::Contract tests below 85% threshold (${RATE}%)"
              exit 1
            fi
          fi

      - name: Cleanup
        if: always()
        run: docker compose -f deployments/docker-compose.yml down -v

  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [build, test, lint, compat-check, contract-tests]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::Required checks failed (build or test)"
            exit 1
          fi
          echo "All required checks passed"
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::warning::Lint has issues (non-blocking)"
          fi
