version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:18.3-alpine
    container_name: o3k-postgres
    environment:
      POSTGRES_DB: lightstack
      POSTGRES_USER: lightstack
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightstack"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - o3k-network

  # Redis Cache (optional - for performance optimization)
  redis:
    image: redis:7-alpine
    container_name: o3k-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - o3k-network
    restart: unless-stopped

  # O3K OpenStack-Compatible Cloud
  o3k:
    build:
      context: ..
      dockerfile: build/package/Dockerfile
    container_name: o3k
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "35357:35357"  # Keystone (Identity)
      - "8774:8774"    # Nova (Compute)
      - "9696:9696"    # Neutron (Network)
      - "8776:8776"    # Cinder (Block Storage)
      - "9292:9292"    # Glance (Image)
      - "8775:8775"    # Metadata Service
    environment:
      O3K_DB_URL: "postgres://lightstack:secret@postgres:5432/lightstack?sslmode=disable"
      O3K_REDIS_URL: "redis://redis:6379/0"
      O3K_CACHE_ENABLED: "true"
      O3K_JWT_SECRET: "${O3K_JWT_SECRET:-change-me-in-production}"
      O3K_LOG_LEVEL: "info"
      O3K_LOG_FORMAT: "json"
      O3K_ENDPOINT_HOST: "o3k"  # Service name for docker-compose network
    networks:
      - o3k-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:35357/v3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Horizon Dashboard (OpenStack Web UI)
  # DISABLED: Kolla Horizon image requires complex Apache/Kolla-Ansible setup
  #
  # Issues with simple docker-compose deployment:
  #   - Apache fails with "no listening sockets available"
  #   - Log directory permission issues
  #   - Missing Apache port configuration
  #   - Requires Kolla-Ansible orchestration for proper setup
  #
  # Alternative: Use OpenStack CLI for API testing:
  #   openstack server list
  #   openstack network list
  #
  # For production Horizon: Deploy with Kolla-Ansible on proper infrastructure
  #
  # horizon:
  #   image: quay.io/openstack.kolla/horizon:2025.2-ubuntu-noble
  #   container_name: o3k-horizon
  #   depends_on:
  #     o3k:
  #       condition: service_healthy
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   environment:
  #     KOLLA_SERVICE_NAME: horizon
  #     KOLLA_CONFIG_STRATEGY: COPY_ALWAYS
  #     OPENSTACK_HOST: o3k
  #   volumes:
  #     - ./deployments/horizon/kolla_config/config.json:/var/lib/kolla/config_files/config.json:ro
  #     - ./deployments/horizon/horizon_settings.py:/var/lib/kolla/config_files/horizon_settings.py:ro
  #     - horizon_logs:/var/log/apache2
  #     - horizon_kolla_logs:/var/log/kolla/horizon
  #   networks:
  #     - o3k-network
  #   restart: unless-stopped
  #   platform: linux/amd64

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  horizon_static:
    driver: local
  horizon_logs:
    driver: local
  horizon_kolla_logs:
    driver: local

networks:
  o3k-network:
    driver: bridge
