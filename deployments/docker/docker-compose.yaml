version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: o3k-postgres
    environment:
      POSTGRES_DB: o3k
      POSTGRES_USER: o3k
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U o3k"]
      interval: 5s
      timeout: 5s
      retries: 5

  o3k:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: o3k
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"  # Keystone
      - "8774:8774"  # Nova
      - "9696:9696"  # Neutron
      - "8776:8776"  # Cinder
      - "9292:9292"  # Glance
    environment:
      O3K_DB_URL: "postgres://o3k:secret@postgres:5432/o3k?sslmode=disable"
      O3K_JWT_SECRET: "${O3K_JWT_SECRET:-change-me-in-production}"
    volumes:
      # For libvirt access (if running on same host)
      - /var/run/libvirt:/var/run/libvirt:ro
      # For network namespace operations
      - /var/run/netns:/var/run/netns
    # Uncomment for privileged operations (netlink, namespaces)
    # privileged: true
    # cap_add:
    #   - NET_ADMIN
    #   - SYS_ADMIN
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
